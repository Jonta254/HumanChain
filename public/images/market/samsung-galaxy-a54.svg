<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" role="img" aria-labelledby="title desc">
  <title id="title">Samsung Galaxy A54 listing photo</title>
  <desc id="desc">A realistic marketplace preview of a clean phone with front and back views.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#dfe8ff"/>
      <stop offset="1" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#1d283a"/>
      <stop offset="1" stop-color="#456b9c"/>
    </linearGradient>
  </defs>
  <rect width="240" height="280" fill="url(#bg)"/>
  <rect x="20" y="26" width="200" height="228" rx="22" fill="#ffffff" opacity=".72"/>
  <rect x="58" y="34" width="88" height="184" rx="18" fill="url(#phone)"/>
  <rect x="65" y="46" width="74" height="160" rx="12" fill="#0e151f"/>
  <circle cx="102" cy="52" r="4" fill="#eef6ff"/>
  <rect x="100" y="72" width="92" height="176" rx="18" fill="#eff4fb" stroke="#b4c0cf" stroke-width="3"/>
  <circle cx="121" cy="93" r="11" fill="#222936"/>
  <circle cx="121" cy="125" r="11" fill="#222936"/>
  <circle cx="121" cy="157" r="11" fill="#222936"/>
  <rect x="34" y="225" width="172" height="20" rx="10" fill="#2f6fed" opacity=".16"/>
  <text x="120" y="239" fill="#25496f" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">3 clean listing photos</text>
</svg>
